name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # npm install, not npm ci: rolldown's @emnapi optional peers resolve to
      # different patch versions on a fresh machine than a cached one, which makes
      # npm ci reject an otherwise-valid lockfile. install tolerates that; the
      # steps below are the real gate.
      - run: npm install --include=optional

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
