name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Plain `npm ci` on purpose: it fails loudly if package-lock.json was
      # regenerated without --include=optional. See BACKLOG.md #3.
      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
