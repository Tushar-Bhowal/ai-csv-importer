name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # --include=optional works around an npm bug: rolldown (via vitest -> vite)
      # pins @emnapi/core as an optional peer, and `npm install` writes a lockfile
      # that plain `npm ci` then rejects as out of sync.
      - run: npm ci --include=optional

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
